[defaults]
interpreter_python=auto_silent
# host_key_checking = False
# callback_whitelist = profile_tasks
# don't like cows?  that's unfortunate.
# set to 1 if you don't want cowsay support or export ANSIBLE_NOCOWS=1 
nocows = 1

# Use the YAML callback plugin.
stdout_callback = yaml
# Use the stdout_callback when running ad-hoc commands.
bin_ansible_callbacks = True

# the initial role path looks for a 'roles' folder relative to the playbook file.  Need it to look in the playbooks/roles folder.
roles_path = ~/.ansible/roles:playbooks/roles:/usr/share/ansible/roles:/etc/ansible/roles

[callback_profile_tasks]
# sort_order = none, ascending, descending
sort_order = descending



