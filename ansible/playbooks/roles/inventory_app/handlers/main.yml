---
- name: restart inventory app http service
  systemd:
    name: "{{ service_name }}"
    state: restarted
    daemon_reload: yes
  listen: restart inventory app http service
  become: yes
  when: ansible_facts.os_family == 'Debian'

- name: restart rsyslog
  systemd:
    name: rsyslog
    state: restarted
  listen: restart rsyslog
  become: yes
  when: ansible_facts.os_family == 'Debian'
